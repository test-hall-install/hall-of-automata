# Hall of Automata — Agent Registry
#
# This is the live catalog. Old Major reads from and writes to this file directly.
# On automaton onboarding, Old Major adds the new agent entry here and commits
# roster/<slug>.md in the same push — no external store, no deployment payload.
#
# To add a new automaton: open the onboarding issue template.
#
# Token model: CLAUDE_CODE_OAUTH_TOKEN lives in invoker/<handle>
# environments. Automata do not hold their own tokens — they run
# under a pool-selected invoker's credential.

meta:
  onboarding_template: .github/ISSUE_TEMPLATE/new-automaton.yml
agents:
  old-major:
    display_name: "Old Major \U0001F3DB️"
    # Persona: roster/old-major.md
    # Token:  pool-selected invoker/<handle> at dispatch time.
    author: mksetaro
    teams: [automata-invokers]
    model: claude-haiku-4-5-20251001 # triage/routing — fast, cheap
    max_retries: 1 # Triage agent. Routes correctly or asks — no retry loop.
    mcp:
      servers:
        sequential-thinking:
          runtime: npx
          package: "@modelcontextprotocol/server-sequential-thinking"
        fetch:
          runtime: npx
          package: "@modelcontextprotocol/server-fetch"
        github:
          runtime: npx
          package: "@github/github-mcp-server"
          env:
            GITHUB_PERSONAL_ACCESS_TOKEN: "{{env.GITHUB_TOKEN}}"
            GITHUB_TOOLSETS: "issues,labels,pull_requests,actions"
      allowed_tools:
        - mcp__sequential-thinking__sequentialthinking
        - mcp__fetch__fetch
        - mcp__github__search_issues
        - mcp__github__create_label
        - mcp__github__update_label
        - mcp__github__add_labels_to_issue
        - mcp__github__list_labels_for_repo
        - mcp__github__list_workflow_run_artifacts
        - mcp__github__download_workflow_run_artifact
    catalog:
      roles: [triage, route, onboard, synthesize]
      domains: [roster-management, task-triage, resource-stewardship, context-synthesis, onboarding, invoker-management, automata-management]
      scope_summary: >
        Entry point for all unlabeled invocations. Reads the roster catalog, picks the right specialist, synthesizes task context. Does not implement code or open PRs.

  snowball:
    display_name: "Snowball \U0001F437"
    # Persona: roster/snowball.md
    # Token:  pool-selected invoker/<handle> at dispatch time.
    author: mksetaro
    teams: [automata-invokers]
    model: claude-sonnet-4-6
    max_retries: 2
    mcp:
      servers:
        sequential-thinking:
          runtime: npx
          package: "@modelcontextprotocol/server-sequential-thinking"
        fetch:
          runtime: npx
          package: "@modelcontextprotocol/server-fetch"
        github:
          runtime: npx
          package: "@github/github-mcp-server"
          env:
            GITHUB_PERSONAL_ACCESS_TOKEN: "{{env.GITHUB_TOKEN}}"
            GITHUB_TOOLSETS: "repos,contents,pull_requests"
      allowed_tools:
        - mcp__sequential-thinking__sequentialthinking
        - mcp__fetch__fetch
        - mcp__github__get_file_contents
        - mcp__github__create_or_update_file
        - mcp__github__push_files
        - mcp__github__create_pull_request
        - mcp__github__create_branch
    catalog:
      roles: [implement, review]
      domains: [hall-infrastructure, persona-engineering]
      scope_summary: >
        Hall infrastructure specialist and Old Major's squire — writes and maintains CI workflows, composite actions, scripts, and agent catalog entries in hall-of-automata; writes and maintains skill files, methodology documents, and persona overlay templates in hall-of-automata-cli; drafts and reviews automaton character sheets.

  hamlet:
    display_name: "Hamlet \U0001F417"
    # Persona: roster/hamlet.md
    # Token:  pool-selected invoker/<handle> at dispatch time.
    invoker: mksetaro
    teams: [automata-invokers]
    model: claude-sonnet-4-6
    max_retries: 2
    mcp:
      servers:
        sequential-thinking:
          runtime: npx
          package: "@modelcontextprotocol/server-sequential-thinking"
        fetch:
          runtime: npx
          package: "@modelcontextprotocol/server-fetch"
        lsp:
          runtime: go-install
          package: github.com/isaacphi/mcp-language-server
          lsp_server: clangd
          lsp_args: ["--compile-commands-dir={{workspace}}"]
          setup: scripts/setup-lsp-cpp.sh
      allowed_tools:
        - mcp__sequential-thinking__sequentialthinking
        - mcp__fetch__fetch
        - mcp__lsp__textDocument_definition
        - mcp__lsp__textDocument_references
        - mcp__lsp__textDocument_diagnostic
        - mcp__lsp__textDocument_hover
    catalog:
      roles: [implement, debug, triage]
      domains: [cpp, build-systems, debugging]
      scope_summary: >
        C++17 high-performance specialist — implements features, fixes bugs, and investigates runtime misbehaviours in Bazel-managed codebases, working from CI output rather than running builds inline.

