name: Post-Dispatch
description: >
  Runs after a successful agent dispatch. Increments the weekly counter,
  uploads an invocation audit log as an Actions Artifact, applies the
  hall:{agent} label to any PR the agent opened, and updates the status card.

inputs:
  app-token:
    description: GitHub App installation token
    required: true
  agent:
    description: Agent identifier (e.g. hamlet)
    required: true
  agent-dispatched:
    description: Agent that was actually dispatched (may differ from requested if rerouted)
    required: true
  rerouted:
    description: "true | false — whether the request was rerouted to a different agent"
    required: false
    default: "false"
  repo-owner:
    description: Target repository owner
    required: true
  repo-name:
    description: Target repository name
    required: true
  issue-number:
    description: Originating issue or PR number
    required: true
  pr-number:
    description: PR opened by the agent (empty if none)
    required: false
    default: ""
  invoker:
    description: GitHub login of the invoker
    required: true
  team-validated:
    description: Team slug that validated the invoker
    required: true
  turns-used:
    description: Number of agentic turns consumed
    required: false
    default: "0"
  turns-max:
    description: Max turns configured for this agent
    required: false
    default: "40"
  retry-count:
    description: Retry attempt number (0 for initial dispatch)
    required: false
    default: "0"
  outcome:
    description: "pr_created | comment_posted | awaiting_input | failed"
    required: true
  weekly-count-after:
    description: Weekly invocation count after this dispatch
    required: false
    default: "0"
  scripts-dir:
    description: Path to the scripts/ directory (default assumes Hall repo checked out at .hall/)
    required: false
    default: ".hall/scripts"

runs:
  using: composite
  steps:
    - name: Apply hall label to PR
      if: inputs.pr-number != ''
      uses: actions/github-script@v7
      env:
        ACTION:     apply-agent
        REPO_OWNER: ${{ inputs.repo-owner }}
        REPO_NAME:  ${{ inputs.repo-name }}
        PR_NUMBER:  ${{ inputs.pr-number }}
        AGENT:      ${{ inputs.agent-dispatched }}
      with:
        github-token: ${{ inputs.app-token }}
        script: |
          const fn = require('${{ inputs.scripts-dir }}/label-utils.js')
          await fn({ github, core })

    - name: Write invocation audit log
      shell: bash
      env:
        AGENT:               ${{ inputs.agent }}
        AGENT_DISPATCHED:    ${{ inputs.agent-dispatched }}
        REROUTED:            ${{ inputs.rerouted }}
        REPO_OWNER:          ${{ inputs.repo-owner }}
        REPO_NAME:           ${{ inputs.repo-name }}
        ISSUE_NUMBER:        ${{ inputs.issue-number }}
        PR_NUMBER:           ${{ inputs.pr-number }}
        INVOKER:             ${{ inputs.invoker }}
        TEAM_VALIDATED:      ${{ inputs.team-validated }}
        TIMESTAMP_START:     ${{ github.event.created_at }}
        TURNS_USED:          ${{ inputs.turns-used }}
        TURNS_MAX:           ${{ inputs.turns-max }}
        RETRY_COUNT:         ${{ inputs.retry-count }}
        OUTCOME:             ${{ inputs.outcome }}
        WEEKLY_COUNT_AFTER:  ${{ inputs.weekly-count-after }}
      run: bash "${{ inputs.scripts-dir }}/write-audit-log.sh"

    - name: Upload audit log artifact
      uses: actions/upload-artifact@v4
      with:
        name: hall-log-${{ inputs.agent-dispatched }}-${{ inputs.issue-number }}-${{ github.run_id }}
        path: hall-invocation-log.json
        retention-days: 90
