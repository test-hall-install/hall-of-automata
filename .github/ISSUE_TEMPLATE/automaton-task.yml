name: "⚔️ Automaton Quest"
description: "Send a task to a registered automaton. The agent operates on what you provide here — fill it out completely. Apply hall:dispatch-automaton to invoke the hall"
title: "[Quest]: <short description>"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        The agent runs with only the context you supply here — no implicit knowledge of your repo or prior work.
        Submitting this form applies `hall:dispatch-automaton`, which triggers Old Major to triage and route.
        To invoke a specific agent directly, apply `hall:<agent>` as a label instead.

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: What you need from the agent.
      options:
        - "Doing — implement this"
        - "Advising — evaluate options and recommend"
        - "Researching — investigate and report"
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Target repository
      description: "Which repo this task concerns. Leave blank if it's this repo."
      placeholder: "MockaSort-Studio/some-repo"

  - type: textarea
    id: context
    attributes:
      label: Context
      description: "What the agent needs to know: relevant files, current behavior, prior decisions, constraints."
      placeholder: |
        - File: core/lifecycle/task.hpp — base class for all tasks
        - Current behavior: X happens when Y is called
        - Prior decision: Z approach was rejected because ...
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: "What done looks like. Use a checklist — the agent will tick these off."
      placeholder: |
        - [ ] Implement X following Y pattern
        - [ ] Unit tests covering Z edge case
        - [ ] BUILD file updated
    validations:
      required: true

  - type: textarea
    id: ci-checks
    attributes:
      label: CI checks
      description: |
        How to verify the PR is green. Provide the local command to run and list any required workflow checks that must pass before merge.
        The agent will reference this when validating its own work before opening a PR.
      placeholder: |
        Local: `bazel test //... --test_output=errors`
        Required checks: lint, build, unit-tests
        Workflow: .github/workflows/ci.yml
    validations:
      required: false

  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      description: |
        Hard limits for this task — safety, process, or operational constraints the agent must not cross.
        Stricter than out-of-scope: if a guardrail would be violated, the agent must stop and escalate rather than proceed.
      placeholder: |
        - Do not modify anything under infra/prod/
        - PR diff must not exceed 300 LOC
        - Request review from @name before any merge
    validations:
      required: false

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: "What the agent should not do or touch on this task."
      placeholder: |
        - Do not refactor unrelated code
        - Do not add new dependencies

  - type: checkboxes
    id: sign-off-required
    attributes:
      label: Sign-off required before action
      options:
        - label: "This task requires human review before any code is pushed"
