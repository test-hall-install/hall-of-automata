name: Hall PR Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Cleanup hall-labeled PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hall repo (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Check for hall label
        id: check
        uses: actions/github-script@v7
        env:
          ACTION: cleanup
        with:
          script: |
            const fn = require('./.hall/scripts/detect-context.js')
            await fn({ github, context, core })

      - name: Create GitHub App token
        id: app-token
        if: steps.check.outputs.agent != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner:       ${{ github.repository_owner }}

      - name: Checkout Hall repo
        if: steps.check.outputs.agent != ''
        uses: actions/checkout@v4
        with:
          path: .hall

      - name: Run cleanup
        if: steps.check.outputs.agent != ''
        uses: ./.hall/actions/cleanup
        with:
          app-token:    ${{ steps.app-token.outputs.token }}
          agent:        ${{ steps.check.outputs.agent }}
          repo-owner:   ${{ github.repository_owner }}
          repo-name:    ${{ github.event.repository.name }}
          pr-number:    ${{ steps.check.outputs.pr-number }}
          issue-number: ${{ steps.check.outputs.issue-number }}
          merged:       ${{ steps.check.outputs.merged }}
