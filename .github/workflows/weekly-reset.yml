name: Weekly Counter Reset

# Fires every Monday at 00:00 UTC. Resets HALL_USAGE_COUNT to 0 for every
# invoker/* GitHub Environment that has that variable. This replaces
# the implicit reset that the old cache-key approach achieved through weekly key
# expiry.

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:  # allow manual trigger for testing or missed resets

jobs:
  reset:
    name: Zero HALL_USAGE_COUNT for all invoker environments
    runs-on: ubuntu-latest
    steps:
      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Reset counters
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO:     ${{ github.repository }}
        shell: bash
        #[lore-keeper] move to script
        run: |
          set -euo pipefail
          RESET_COUNT=0

          for ENV_NAME in $(gh api "/repos/${REPO}/environments" --paginate \
              --jq '.environments[].name' | grep -E '^invoker/'); do

            ENV_ENCODED="${ENV_NAME//\//%2F}"

            # Check variable exists; skip silently if not
            if gh api "/repos/${REPO}/environments/${ENV_ENCODED}/variables/HALL_USAGE_COUNT" \
                --silent 2>/dev/null; then
              gh api --method PATCH \
                "/repos/${REPO}/environments/${ENV_ENCODED}/variables/HALL_USAGE_COUNT" \
                -f name=HALL_USAGE_COUNT \
                -f value=0
              echo "Reset: ${ENV_NAME}"
              RESET_COUNT=$(( RESET_COUNT + 1 ))
            fi
          done

          echo "Weekly reset complete: ${RESET_COUNT} environment(s) zeroed."

      - name: Check routing.yml reset_day consistency
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO:     ${{ github.repository }}
        shell: bash
        # The cron schedule above is static YAML — it cannot be dynamic.
        # This step validates that routing.yml reset_day agrees with the scheduled day.
        # Cron '0 0 * * 1' fires on day-of-week 1 = Monday.
        run: |
          set -euo pipefail
          CRON_DAY=1   # day-of-week from 'cron: 0 0 * * 1' above

          ROUTING_CONTENT=$(gh api "/repos/${REPO}/contents/routing.yml" --jq '.content' | base64 -d 2>/dev/null || true)
          if [ -z "${ROUTING_CONTENT}" ]; then
            echo "::warning::Could not fetch routing.yml — skipping reset_day consistency check."
            exit 0
          fi

          RESET_DAY=$(echo "${ROUTING_CONTENT}" | grep -E '^\s+reset_day:' | sed 's/.*reset_day:[[:space:]]*//' | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          if [ -z "${RESET_DAY}" ]; then
            echo "::warning::routing.yml has no reset_day field — skipping consistency check."
            exit 0
          fi

          case "${RESET_DAY}" in
            sunday)    ROUTING_DAY=0 ;;
            monday)    ROUTING_DAY=1 ;;
            tuesday)   ROUTING_DAY=2 ;;
            wednesday) ROUTING_DAY=3 ;;
            thursday)  ROUTING_DAY=4 ;;
            friday)    ROUTING_DAY=5 ;;
            saturday)  ROUTING_DAY=6 ;;
            *)
              echo "::warning::routing.yml reset_day='${RESET_DAY}' is not a recognised day name — skipping consistency check."
              exit 0
              ;;
          esac

          if [ "${ROUTING_DAY}" -ne "${CRON_DAY}" ]; then
            echo "::warning::routing.yml reset_day='${RESET_DAY}' (day ${ROUTING_DAY}) does not match the cron schedule day ${CRON_DAY}. Update the cron in weekly-reset.yml or reset_day in routing.yml to keep them in sync."
          else
            echo "routing.yml reset_day='${RESET_DAY}' matches cron schedule (day ${CRON_DAY}). Consistent."
          fi
