name: Retry Queued Tasks

# Fires nightly. Finds all open issues labeled hall:queued (applied when the
# agent reported quota_exceeded) and re-triggers dispatch by cycling the bound
# agent label. If the retry also hits quota, the dispatch job re-applies
# hall:queued, and the next nightly run picks it up again.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  retry:
    name: Retry hall:queued issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hall repo (scripts only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner:       ${{ github.repository_owner }}

      - name: Retry queued issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./scripts/retry-queued.js')
            await fn({ github, context, core })
