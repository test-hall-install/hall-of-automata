name: Onboard Invoker

# Four-job flow:
#   setup      — issue labeled hall:onboard-invoker → provision environment, post instructions
#   parse-ready — invoker replies "ready"           → parse + confirm secret slot exists
#   test-token  — dispatch action (1 turn)          → exposes token-status (ok|rate_limited|unauthorized|error)
#   finalize    — resolve result → welcome on pass, retry prompt on fail

concurrency:
  group: onboard-invoker-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ── Phase 1: provision environment ───────────────────────────────────────────
  setup:
    name: Provision invoker environment
    if: >-
      github.event_name == 'issues' &&
      github.event.label.name == 'hall:onboard-invoker'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse issue fields
        id: fields
        uses: actions/github-script@v7
        env:
          ACTION:      parse
          ISSUE_BODY:  ${{ github.event.issue.body }}
          ISSUE_LOGIN: ${{ github.event.issue.user.login }}
        with:
          script: |
            const fn = require('./.hall/scripts/invoker-onboarding.js')
            await fn({ github, core })

      - name: Create invoker environment and post instructions
        uses: actions/github-script@v7
        env:
          ACTION:           create-env
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          INVOKER_USERNAME: ${{ steps.fields.outputs.invoker-username }}
          WEEKLY_CAP_HOURS: ${{ steps.fields.outputs.weekly-cap-hours }}
          ISSUE_NUMBER:     ${{ github.event.issue.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/invoker-onboarding.js')
            await fn({ github, core })

  # ── Phase 2a: parse "ready" reply, confirm secret slot exists ────────────────
  parse-ready:
    name: Parse ready signal
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.sender.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'hall:onboard-invoker')
    runs-on: ubuntu-latest
    outputs:
      is-ready:         ${{ steps.signal.outputs.is-ready }}
      invoker-username: ${{ steps.fields.outputs.invoker-username }}
      secret-found:     ${{ steps.check.outputs.secret-found }}
    steps:
      - name: Check for ready signal
        id: signal
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim().toLowerCase()
            core.setOutput('is-ready', body.startsWith('ready') ? 'true' : 'false')

      - name: Checkout (scripts only)
        if: steps.signal.outputs.is-ready == 'true'
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Create App token
        if: steps.signal.outputs.is-ready == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Parse invoker username from issue body
        if: steps.signal.outputs.is-ready == 'true'
        id: fields
        uses: actions/github-script@v7
        env:
          ACTION:      parse
          ISSUE_BODY:  ${{ github.event.issue.body }}
          ISSUE_LOGIN: ${{ github.event.issue.user.login }}
        with:
          script: |
            const fn = require('./.hall/scripts/invoker-onboarding.js')
            await fn({ github, core })

      - name: Check secret slot exists
        if: steps.signal.outputs.is-ready == 'true'
        id: check
        uses: actions/github-script@v7
        env:
          ACTION:           verify
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          INVOKER_USERNAME: ${{ steps.fields.outputs.invoker-username }}
          ISSUE_NUMBER:     ${{ github.event.issue.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/invoker-onboarding.js')
            await fn({ github, core })

  # ── test-token: validate the invoker's OAuth token ───────────────────────────
  # Runs the dispatch action (1 turn) — confirms the full pipeline end-to-end.
  # The action exposes token-status (ok | rate_limited | unauthorized | error);
  # resolve-token-result.sh maps that to test-passed=true|false.
  test-token:
    name: Validate invoker token
    needs: [parse-ready]
    if: >-
      needs.parse-ready.outputs.is-ready == 'true' &&
      needs.parse-ready.outputs.secret-found == 'true'
    runs-on: ubuntu-latest
    environment: invoker/${{ needs.parse-ready.outputs.invoker-username }}
    outputs:
      test-passed: ${{ steps.result.outputs.test-passed }}
    steps:
      - name: Checkout Hall repo (dispatch action)
        uses: actions/checkout@v4

      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Validate token via dispatch
        id: dispatch
        continue-on-error: true
        uses: ./actions/dispatch
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token:   ${{ steps.app-token.outputs.token }}
          max-turns:   1
          prompt:      "Token validation check — do not use any tools, do not read any files. Reply with exactly one word: ready"

      - name: Resolve result
        id: result
        shell: bash
        env:
          DISPATCH_OUTCOME: ${{ steps.dispatch.outcome }}
          TOKEN_STATUS:     ${{ steps.dispatch.outputs.token-status }}
        run: bash scripts/resolve-token-result.sh

  # ── Phase 2c: post result ─────────────────────────────────────────────────────
  finalize:
    name: Post onboarding result
    needs: [parse-ready, test-token]
    if: always() && needs.parse-ready.outputs.is-ready == 'true' && needs.parse-ready.outputs.secret-found == 'true' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Post welcome or failure comment
        uses: actions/github-script@v7
        env:
          ACTION:           finalize
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          ISSUE_NUMBER:     ${{ github.event.issue.number }}
          INVOKER_USERNAME: ${{ needs.parse-ready.outputs.invoker-username }}
          TEST_PASSED:      ${{ needs.test-token.outputs.test-passed }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/invoker-onboarding.js')
            await fn({ github, core })

