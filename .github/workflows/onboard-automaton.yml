name: Onboard Automaton

# Two-phase flow:
#   Phase 1 — issue labeled hall:onboard-automaton → Old Major analyzes, provisions or asks
#   Phase 2 — invoker replies after feedback       → Old Major re-evaluates and provisions
#
# Token model: Old Major has no dedicated environment. His persona lives in
# roster/old-major.md (repo file). His OAuth token is pool-selected from registered
# invoker/* environments — same as any dispatch. The select-invoker job does the
# REST API query; analyze/re-analyze run in the chosen invoker's environment.

concurrency:
  group: onboard-automaton-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # ── Pool-select invoker (shared by both phases) ───────────────────────────────
  select-invoker:
    name: Select invoker from pool
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'hall:onboard-automaton') ||
      (github.event_name == 'issue_comment' &&
       github.event.sender.type != 'Bot' &&
       contains(github.event.issue.labels.*.name, 'hall:onboard-automaton') &&
       contains(github.event.issue.labels.*.name, 'hall:awaiting-input'))
    runs-on: ubuntu-latest
    outputs:
      invoker:       ${{ steps.pool.outputs.invoker }}
      invoker-count: ${{ steps.pool.outputs.invoker-count }}
    steps:
      - name: Checkout Hall repo (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Select least-used invoker
        id: pool
        uses: actions/github-script@v7
        env:
          FAIL_FAST:    'true'
          FAIL_MESSAGE: 'No invoker available — all at cap. Old Major cannot be dispatched.'
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/select-invoker.js')
            await fn({ github, context, core })

  # ── Phase 1: analyze submission and provision if it passes ────────────────────
  analyze:
    name: "Old Major — analyze submission"
    needs: [select-invoker]
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'hall:onboard-automaton'
    runs-on: ubuntu-latest
    environment: invoker/${{ needs.select-invoker.outputs.invoker }}
    steps:
      - name: Checkout Hall repo
        uses: actions/checkout@v4

      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Inject Old Major persona
        run: cat agents/automaton_base.md roster/old-major.md > CLAUDE.md

      - name: Increment invoker weekly counter
        uses: ./actions/counter
        with:
          current-count:    ${{ needs.select-invoker.outputs.invoker-count }}
          environment-name: invoker/${{ needs.select-invoker.outputs.invoker }}
          repo-owner:       ${{ github.repository_owner }}
          repo-name:        ${{ github.event.repository.name }}
          app-token:        ${{ steps.app-token.outputs.token }}
          scripts-dir:      scripts

      - name: Dispatch Old Major — onboarding analysis
        id: dispatch
        uses: ./actions/dispatch
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token:   ${{ steps.app-token.outputs.token }}
          max-turns:   30
          prompt: >-
            You are handling automaton onboarding for issue #${{ github.event.issue.number }}
            in ${{ github.repository }}, submitted by @${{ github.event.issue.user.login }}.

            Reference files (read before evaluating):
            - agents/automaton_template.md — expected character sheet format
            - agents.yml — existing slugs (check uniqueness)

            Evaluate the character sheet in the issue body against these criteria:
            slug (lowercase-kebab, unique in agents.yml), display_name,
            character (tone/voice/rules/signature — behavioural contract not biography),
            domains (named capability bundles, routing signals not tool lists),
            scope (right-for / not-right-for / ambiguity-gate all present),
            scope_summary (one sentence, optimised for routing decisions),
            max_turns (optional integer — use 30 if blank or absent; record in catalog entry).

            If any required field is missing or unusable: post a comment listing exactly what
            needs fixing, apply label hall:awaiting-input, and stop — do not provision anything.

            If the sheet passes: create a new branch (hall/old-major/issue-<N>),
            then in a single commit: (1) add the new agent entry to agents.yml,
            (2) write the persona character sheet to roster/<slug>.md, and
            (3) append a new section to codex/roster.md following the exact format
            of the existing agent entries there — h2 heading with the display name,
            bold role summary, tone, domains table, right-call/not-right-call lines,
            and signature. Push the branch, open a pull request targeting main with
            a concise title and body, post a provisioning summary comment on the
            issue linking to the PR, then close the issue.

      - name: Post quota-queued comment and label
        if: always() && hashFiles('.hall/dispatch-result.json') != ''
        id: quota-check-analyze
        shell: bash
        run: |
          outcome=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('.hall/dispatch-result.json','utf8')).outcome||'')}catch(e){console.log('')}")
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"

      - name: Queue issue on quota exceeded
        if: always() && steps.quota-check-analyze.outputs.outcome == 'quota_exceeded'
        env:
          ACTION:       quota-queued
          REPO_OWNER:   ${{ github.repository_owner }}
          REPO_NAME:    ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AGENT:        old-major
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./scripts/notification.js')
            await fn({ github, core })

  # ── Phase 2: re-evaluate after invoker addresses feedback ─────────────────────
  re-analyze:
    name: "Old Major — re-evaluate after feedback"
    needs: [select-invoker]
    if: >
      github.event_name == 'issue_comment' &&
      github.event.sender.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'hall:onboard-automaton') &&
      contains(github.event.issue.labels.*.name, 'hall:awaiting-input')
    runs-on: ubuntu-latest
    environment: invoker/${{ needs.select-invoker.outputs.invoker }}
    steps:
      - name: Checkout Hall repo
        uses: actions/checkout@v4

      - name: Create App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Inject Old Major persona
        run: cat agents/automaton_base.md roster/old-major.md > CLAUDE.md

      - name: Increment invoker weekly counter
        uses: ./actions/counter
        with:
          current-count:    ${{ needs.select-invoker.outputs.invoker-count }}
          environment-name: invoker/${{ needs.select-invoker.outputs.invoker }}
          repo-owner:       ${{ github.repository_owner }}
          repo-name:        ${{ github.event.repository.name }}
          app-token:        ${{ steps.app-token.outputs.token }}
          scripts-dir:      scripts

      - name: Dispatch Old Major — re-evaluate
        id: dispatch
        uses: ./actions/dispatch
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token:   ${{ steps.app-token.outputs.token }}
          max-turns:   30
          prompt: >-
            The invoker has updated the automaton onboarding request on
            issue #${{ github.event.issue.number }} in ${{ github.repository }}.

            Reference files (read before evaluating):
            - agents/automaton_template.md — expected character sheet format
            - agents.yml — existing slugs (check uniqueness)

            Re-read the issue body (character sheet) and all comments.
            If all outstanding issues from your previous review are resolved:
            remove the hall:awaiting-input label, then proceed with full provisioning
            (create branch hall/old-major/issue-<N>, commit agents.yml + roster/<slug>.md
            + the new codex/roster.md entry in one commit, push, open a PR targeting
            main, post a summary comment on the issue linking to the PR, close the
            issue). The codex/roster.md entry must follow the format of existing entries:
            h2 heading, bold role summary, tone, domains table, right-call/not-right-call,
            signature.
            If gaps remain, post updated feedback. Do not provision until the sheet is complete.

      - name: Post quota-queued comment and label
        if: always() && hashFiles('.hall/dispatch-result.json') != ''
        id: quota-check-re-analyze
        shell: bash
        run: |
          outcome=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('.hall/dispatch-result.json','utf8')).outcome||'')}catch(e){console.log('')}")
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"

      - name: Queue issue on quota exceeded
        if: always() && steps.quota-check-re-analyze.outputs.outcome == 'quota_exceeded'
        env:
          ACTION:       quota-queued
          REPO_OWNER:   ${{ github.repository_owner }}
          REPO_NAME:    ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AGENT:        old-major
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./scripts/notification.js')
            await fn({ github, core })
